services:
  - type: web
    name: dew-claw-comp-tool
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: APP_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: COMP_CORPUS_DIR
        value: data/comp-corpus
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
